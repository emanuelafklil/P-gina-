<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario - Tecnologías Emergentes</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #6ec6ff, #b388ff);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 90%;
        max-width: 500px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 {
        color: #6a1b9a;
    }
    #question {
        font-size: 18px;
        margin: 20px 0;
    }
    textarea {
        width: 100%;
        height: 80px;
        border-radius: 10px;
        border: 2px solid #6ec6ff;
        padding: 10px;
        font-size: 14px;
    }
    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #6a1b9a;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
        background: #4a148c;
    }
</style>
</head>
<body>

<div class="container">
    <h1>📚 Cuestionario</h1>
    <div id="question"></div>
    <textarea id="answer" placeholder="Escribe tu respuesta aquí..."></textarea>
    <br>
    <button onclick="nextQuestion()">Siguiente</button>
</div>

<script>
const questions = [
"¿Qué caracteriza a las tecnologías emergentes?",
"¿Qué permiten hacer con el aprendizaje?",
"¿Cómo ayudan al acceso a la educación?",
"¿Qué fomentan entre estudiantes?",
"¿Qué cambian en la enseñanza tradicional?",
"¿Por qué son importantes en zonas rurales?",
"¿Qué problema ayudan a reducir?",
"¿Cómo hacen las clases más interesantes?",
"¿Qué permiten al estudiante hacer mejor?",
"¿Qué cambio generan en la educación?",

"¿Qué es la inteligencia artificial en palabras simples?",
"¿Cómo ayuda la IA al estudiante?",
"¿Qué tipo de apoyo brindan las tutorías virtuales?",
"¿Qué hace la corrección automática?",
"¿Cómo genera ejercicios la IA?",
"¿Qué analiza la IA del estudiante?",
"¿Qué tipo de enseñanza permite la IA?",
"¿Qué ventaja tiene la retroalimentación inmediata?",
"¿Cómo mejora el rendimiento académico?",
"¿Por qué se debe usar con responsabilidad?",

"¿Qué son las clases virtuales?",
"¿Qué herramientas se usan en clases virtuales?",
"¿Cuál es una ventaja importante?",
"¿Qué permite la flexibilidad de horarios?",
"¿Qué recursos hacen las clases más dinámicas?",
"¿En qué situaciones fueron muy importantes?",
"¿Cómo ayudan a estudiantes de zonas alejadas?",
"¿Qué tipo de barreras eliminan?",
"¿Qué permiten las plataformas digitales?",
"¿Cómo cambian la educación tradicional?",

"¿Qué dispositivos se usan en educación actualmente?",
"¿Para qué sirven los celulares en el aprendizaje?",
"¿Qué permiten hacer las tablets?",
"¿Qué tipo de lectura se promueve?",
"¿Qué habilidades se desarrollan?",
"¿Por qué son útiles estos dispositivos?",
"¿Qué ventaja tienen frente a libros físicos?",
"¿Cómo ayudan al estudiante?",
"¿Qué tipo de aprendizaje promueven?",
"¿Cómo complementan la educación?",

"¿Cuál es un beneficio principal de estas tecnologías?",
"¿Cómo ayudan al estudiante?",
"¿Qué fomentan en la educación?",
"¿Qué habilidades desarrollan?",
"¿Cómo mejoran la enseñanza?",
"¿Qué tipo de aprendizaje promueven?",
"¿Qué integración permiten?",
"¿Por qué son importantes en Bolivia?",
"¿Cómo ayudan a la comunidad?",
"¿Qué logran en el modelo educativo?"
];

let current = 0;

function showQuestion() {
    document.getElementById("question").innerText = questions[current];
    document.getElementById("answer").value = "";
}

function nextQuestion() {
    if (current < questions.length - 1) {
        current++;
        showQuestion();
    } else {
        document.getElementById("question").innerText = "🎉 ¡Has terminado el cuestionario!";
        document.getElementById("answer").style.display = "none";
    }
}

showQuestion();
</script>

</body>
</html>
